<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1565C0">
<title>EMTUSA Gijón</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,sans-serif}
#map{width:100%;height:100%}
#status{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(0,0,0,.8);color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;display:none;backdrop-filter:blur(6px);max-width:90%}
#pbar{position:fixed;top:42px;left:50%;transform:translateX(-50%);z-index:1000;width:200px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;display:none;backdrop-filter:blur(6px)}
#pbar>div{height:100%;background:#64B5F6;border-radius:2px;transition:width .2s}
#legend{position:fixed;bottom:10px;left:10px;z-index:999;background:rgba(0,0,0,.85);color:#fff;padding:10px 14px;border-radius:12px;font-size:11px;max-width:220px;backdrop-filter:blur(10px);transition:all .3s}
#leg-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
#leg-header h3{font-size:13px;color:#64B5F6;margin:0}
#btn-minimize{font-size:14px;color:#64B5F6;transition:transform .2s;user-select:none;padding:0 2px}
#leg-body{margin-top:8px;max-height:45vh;overflow-y:auto}
#legend.minimized #leg-body{display:none}
#legend.minimized #btn-minimize{transform:rotate(-90deg)}
#legend.minimized{padding:8px 12px}
#btn-toggle{width:100%;padding:6px;border:1px solid rgba(255,255,255,.2);border-radius:6px;background:transparent;color:#fff;font-size:10px;cursor:pointer;margin-bottom:8px}
#btn-toggle:active{background:rgba(255,255,255,.1)}
.leg-line{display:flex;align-items:center;gap:6px;padding:4px 0;cursor:pointer;transition:opacity .2s}
.leg-line.off{opacity:.3}
.leg-dot{width:24px;height:24px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
.leg-name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#info{position:fixed;bottom:10px;left:10px;z-index:1000;background:rgba(0,0,0,.85);color:#fff;padding:8px 12px;border-radius:10px;font-size:11px;backdrop-filter:blur(10px)}
.bus-icon{display:flex;align-items:center;gap:4px;white-space:nowrap}
.bus-num{border:2px solid #fff;border-radius:50%;width:22px;height:22px;text-align:center;line-height:18px;font-size:9px;font-weight:800;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.4);flex-shrink:0}
.bus-dest{background:rgba(0,0,0,.75);color:#fff;font-size:9px;font-weight:600;padding:2px 5px;border-radius:4px;max-width:100px;overflow:hidden;text-overflow:ellipsis;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.leaflet-popup-content{font-size:13px;line-height:1.5}
.leaflet-popup-content b{color:#1565C0}
#search-panel{position:fixed;top:88px;left:10px;z-index:1000;max-width:320px;width:calc(100% - 20px);backdrop-filter:blur(10px)}
#search-bar{display:flex;gap:4px}
#search-bar input{flex:1;padding:10px 12px;border:none;border-radius:10px;background:rgba(0,0,0,.8);color:#fff;font-size:14px;outline:none}
#search-bar input::placeholder{color:rgba(255,255,255,.5)}
#search-bar button{width:40px;border:none;border-radius:10px;background:rgba(0,0,0,.8);color:#64B5F6;cursor:pointer;font-size:18px}
#search-bar button:active{background:rgba(0,0,0,.9)}
#sug-list{background:rgba(0,0,0,.9);border-radius:0 0 10px 10px;max-height:200px;overflow-y:auto;display:none}
#sug-list div{padding:10px 12px;font-size:12px;color:#fff;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.1)}
#sug-list div:hover{background:rgba(255,255,255,.1)}
#sug-list div small{color:rgba(255,255,255,.5)}
.stop-card{background:rgba(255,255,255,.08);border-radius:10px;padding:12px;margin-bottom:8px}
.stop-name{font-size:13px;font-weight:700;margin-bottom:6px}
.stop-dist{font-size:11px;color:#64B5F6;margin-bottom:6px}
.arrival{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.arrival:last-child{border:none}
.arr-line{width:24px;height:24px;border-radius:6px;text-align:center;line-height:24px;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.arr-dest{flex:1;color:#ccc;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.arr-time{font-weight:700;color:#fff;font-size:14px;white-space:nowrap}
#mode-bar{position:fixed;top:10px;right:50px;z-index:1000;display:flex;gap:3px;backdrop-filter:blur(10px)}
.mode-btn{padding:7px 10px;border:none;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:rgba(0,0,0,.7);color:#fff;transition:all .15s}
.mode-btn.on{background:#1565C0;color:#fff}
.stop-label{background:rgba(21,101,192,.9)!important;border:none!important;color:#fff!important;font-size:10px!important;font-weight:600!important;padding:2px 6px!important;border-radius:4px!important}
.stop-label::before{border-right-color:rgba(21,101,192,.9)!important}
.bici-icon{width:24px;height:24px;border-radius:50%;text-align:center;line-height:24px;font-size:11px;font-weight:800;color:#fff;box-shadow:0 2px 4px rgba(0,0,0,.3);border:2px solid #fff}
.taxi-icon{width:28px;height:28px;border-radius:8px;text-align:center;line-height:28px;font-size:15px;box-shadow:0 2px 6px rgba(0,0,0,.4);background:#f59e0b;cursor:pointer}
#taxi-panel{position:fixed;bottom:10px;right:10px;z-index:999;background:rgba(0,0,0,.85);color:#fff;padding:10px 14px;border-radius:12px;font-size:11px;max-width:260px;backdrop-filter:blur(10px);display:none}
#taxi-panel h3{font-size:13px;color:#f59e0b;margin:0 0 8px}
.taxi-phone{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.taxi-phone:last-child{border:none}
.taxi-phone a{color:#f59e0b;text-decoration:none;font-weight:700;font-size:13px}
.meteo-avg{text-align:center;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.1)}
.meteo-avg-temp{font-size:28px;font-weight:800}
.meteo-avg-label{font-size:10px;color:#aaa;margin-top:2px}
#compare-bar{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:1001;background:rgba(0,0,0,.85);border-radius:12px;padding:8px 12px;backdrop-filter:blur(10px);display:none;align-items:center;gap:6px}
#compare-bar select{padding:6px 8px;border-radius:8px;border:1px solid #555;background:#16213e;color:#e0e0e0;font-size:11px}
#compare-bar button{padding:6px 12px;border:none;border-radius:8px;background:#F44336;color:#fff;font-size:11px;font-weight:600;cursor:pointer}
.leaflet-sbs-range{position:absolute;top:50%;width:100%;z-index:999;-webkit-appearance:none;display:inline-block!important;vertical-align:middle;height:0;padding:0;margin:0;border:0;background:rgba(0,0,0,.25);cursor:pointer;pointer-events:none}
.leaflet-sbs-divider{position:absolute;top:0;bottom:0;left:50%;margin-left:-2px;width:4px;background-color:#fff;pointer-events:none;z-index:999;box-shadow:0 0 6px rgba(0,0,0,.5)}
.leaflet-sbs-range::-webkit-slider-thumb{-webkit-appearance:none;margin:0;padding:0;background:#fff;height:44px;width:44px;border-radius:22px;cursor:ew-resize;pointer-events:auto;border:1px solid #ddd;box-shadow:0 0 6px rgba(0,0,0,.3)}
.leaflet-sbs-range::-moz-range-thumb{padding:0;background:#fff;height:44px;width:44px;border-radius:22px;cursor:ew-resize;pointer-events:auto;border:1px solid #ddd;box-shadow:0 0 6px rgba(0,0,0,.3)}
.leaflet-sbs-range::-moz-range-track{opacity:0}
.leaflet-sbs-range:focus{outline:none!important}
.taxi-phone span{color:#ccc;font-size:11px;flex:1}
.aire-icon{width:36px;height:36px;border-radius:10px;text-align:center;line-height:36px;font-size:12px;font-weight:800;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.4);border:2px solid #fff}
#aire-panel{position:fixed;bottom:10px;right:10px;z-index:999;background:rgba(0,0,0,.85);color:#fff;padding:10px 14px;border-radius:12px;font-size:11px;max-width:280px;max-height:50vh;overflow-y:auto;backdrop-filter:blur(10px);display:none}
#aire-panel h3{font-size:13px;color:#4ade80;margin:0 0 8px}
.aire-card{background:rgba(255,255,255,.08);border-radius:8px;padding:8px 10px;margin-bottom:6px}
.aire-card:last-child{margin-bottom:0}
.aire-station{font-size:12px;font-weight:700;margin-bottom:4px}
.aire-row{display:flex;gap:8px;font-size:10px;color:#ccc;flex-wrap:wrap}
.aire-qual{font-weight:700;font-size:11px}
#search-tabs{display:flex;gap:4px;margin-bottom:4px}
.tab-btn{flex:1;padding:7px;border:none;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;background:rgba(0,0,0,.6);color:rgba(255,255,255,.5);transition:all .15s}
.tab-btn.on{background:rgba(0,0,0,.85);color:#64B5F6}
#stop-dash{background:rgba(0,0,0,.92);color:#fff;border-radius:12px;padding:12px;margin-top:4px;max-height:50vh;overflow-y:auto;display:none;backdrop-filter:blur(10px)}
#stop-dash .sd-title{font-size:13px;font-weight:700;color:#64B5F6;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
#stop-dash .sd-close{cursor:pointer;font-size:16px;color:#aaa}
#stop-dash .sd-code{font-size:11px;color:#888;font-weight:400}
#stop-dash .arrival{border-bottom:1px solid rgba(255,255,255,.08)}
#stop-dash .arrival:last-child{border:none}
</style>
</head>
<body>
<div id="map"></div>
<div id="bus-tabs" style="position:fixed;top:50px;left:10px;z-index:1001;display:none">
  <div style="display:flex;gap:4px">
    <button class="tab-btn" id="tab-dir" onclick="setBusTab('dir')">Dirección</button>
    <button class="tab-btn" id="tab-par" onclick="setBusTab('par')">Paradas</button>
    <button class="tab-btn" id="tab-lin" onclick="setBusTab('lin')">Líneas</button>
  </div>
</div>
<div id="search-panel" style="display:none">
  <div id="search-bar">
    <input id="inp-search" type="text" placeholder="Buscar dirección en Gijón..." autocomplete="off">
    <button id="btn-gps" onclick="gpsSearch()" title="Mi ubicación">&#9737;</button>
  </div>
  <div id="sug-list"></div>
  <div id="stop-dash">
    <div class="sd-title"><span id="sd-label"></span><span class="sd-close" onclick="closeStopDash()">✕</span></div>
    <div id="sd-stops"></div>
  </div>
</div>
<div id="mode-bar">
  <button class="mode-btn on" id="mode-bus" onclick="setMode('bus')">EMTUSA</button>
  <button class="mode-btn" id="mode-bici" onclick="setMode('bici')">Bici</button>
  <button class="mode-btn" id="mode-taxi" onclick="setMode('taxi')">Taxi</button>
  <button class="mode-btn" id="mode-aire" onclick="setMode('aire')">Aire</button>
  <button class="mode-btn" id="mode-meteo" onclick="setMode('meteo')">Tiempo</button>
  <button class="mode-btn" id="mode-compare" onclick="toggleCompare()" style="background:rgba(0,0,0,.5)">Comparar</button>
</div>
<div id="compare-bar" style="display:none">
  <select id="cmp-left"><option value="carto">Callejero</option><option value="pnoa">PNOA Actual</option><option value="mtn">MTN25</option><option value="pnoa20">PNOA 2020</option><option value="pnoa17">PNOA 2017</option><option value="pnoa14">PNOA 2014</option><option value="pnoa11">PNOA 2011</option><option value="pnoa09">PNOA 2009</option><option value="ams">Vuelo 1956</option></select>
  <select id="cmp-right"><option value="carto">Callejero</option><option value="pnoa" selected>PNOA Actual</option><option value="mtn">MTN25</option><option value="pnoa20">PNOA 2020</option><option value="pnoa17">PNOA 2017</option><option value="pnoa14">PNOA 2014</option><option value="pnoa11">PNOA 2011</option><option value="pnoa09">PNOA 2009</option><option value="ams">Vuelo 1956</option></select>
  <button onclick="toggleCompare()">Cerrar</button>
</div>
<div id="status"></div>
<div id="pbar"><div id="pbar-fill"></div></div>
<div id="legend" style="display:none"><div id="leg-header" onclick="toggleLegend()"><h3>Líneas EMTUSA</h3><span id="btn-minimize">▾</span></div><div id="leg-body"><button id="btn-toggle" onclick="toggleAll(event)">Mostrar todas</button><div id="leg-list"></div></div></div>
<button id="btn-geolocate" onclick="geolocalizarCalle()" style="position:fixed;top:140px;right:10px;z-index:999;width:36px;height:36px;border:none;border-radius:50%;background:rgba(0,0,0,.7);color:#64B5F6;cursor:pointer;font-size:20px;box-shadow:0 2px 6px rgba(0,0,0,.3)">&#9737;</button>
<div id="aire-panel">
  <h3>Calidad del Aire</h3>
  <div id="aire-stops"></div>
</div>
<div id="taxi-panel">
  <h3>Teléfonos Taxi Gijón</h3>
  <div class="taxi-phone"><span>Radio Taxi Gijón</span><a href="tel:985141111">985 14 11 11</a></div>
  <div class="taxi-phone"><span>Taxi Gijón (Los Amarillos)</span><a href="tel:985346666">985 34 66 66</a></div>
  <div class="taxi-phone"><span>Taxis Gijón (Los Verdes)</span><a href="tel:985164444">985 16 44 44</a></div>
  <div class="taxi-phone"><span>Fed. Asturiana Sindical del Taxi</span><a href="tel:985164434">985 16 44 34</a></div>
  <div class="taxi-phone"><span>MoviTaxi</span><a href="tel:900649145">900 649 145</a></div>
</div>
<div id="info"></div>

<script>
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
const API="https://emtusasiri.pub.gijon.es/emtusasiri";
const OSRM="https://router.project-osrm.org/route/v1/driving";
const LINE_TRAYECTOS={1:[1,2],2:[14,13],4:[9,10,18,19],10:[5,6],15:[11,12],18:[13,14],20:[5,6],41:[1,2],42:[1,2],43:[1,2],44:[4,5],45:[1,2],46:[2,4]};
let TOKEN=null,lineas={},routeLayers={},busLayer=null,hiddenLines=new Set(),loadedRoutes=new Set();

const map=L.map("map",{zoomControl:false}).setView([43.5322,-5.6611],13);
L.control.zoom({position:"topright"}).addTo(map);
const baseCarto=L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{attribution:'&copy; CARTO',maxZoom:19}).addTo(map);
const basePNOA=L.tileLayer("https://www.ign.es/wmts/pnoa-ma?layer=OI.OrthoimageCoverage&style=default&tilematrixset=GoogleMapsCompatible&Service=WMTS&Request=GetTile&Version=1.0.0&format=image/jpeg&TileMatrix={z}&TileRow={y}&TileCol={x}",{attribution:'PNOA &copy; IGN',maxZoom:19});
const baseMTN=L.tileLayer.wms("https://www.ign.es/wms-inspire/mapa-raster?",{layers:"mtn_rasterizado",format:"image/png",transparent:false,attribution:'MTN &copy; IGN',maxZoom:19});
const baseAMS=L.tileLayer.wms("https://www.ign.es/wms/pnoa-historico?",{layers:"AMS_1956-1957",format:"image/png",transparent:false,attribution:'Vuelo 1956 &copy; IGN',maxZoom:19});
const basePNOA09=L.tileLayer.wms("https://www.ign.es/wms/pnoa-historico?",{layers:"PNOA2009",format:"image/png",transparent:false,attribution:'PNOA 2009 &copy; IGN',maxZoom:19});
const basePNOA11=L.tileLayer.wms("https://www.ign.es/wms/pnoa-historico?",{layers:"PNOA2011",format:"image/png",transparent:false,attribution:'PNOA 2011 &copy; IGN',maxZoom:19});
const basePNOA14=L.tileLayer.wms("https://www.ign.es/wms/pnoa-historico?",{layers:"PNOA2014",format:"image/png",transparent:false,attribution:'PNOA 2014 &copy; IGN',maxZoom:19});
const basePNOA17=L.tileLayer.wms("https://www.ign.es/wms/pnoa-historico?",{layers:"PNOA2017",format:"image/png",transparent:false,attribution:'PNOA 2017 &copy; IGN',maxZoom:19});
const basePNOA20=L.tileLayer.wms("https://www.ign.es/wms/pnoa-historico?",{layers:"PNOA2020",format:"image/png",transparent:false,attribution:'PNOA 2020 &copy; IGN',maxZoom:19});
L.control.layers({"Callejero":baseCarto,"PNOA Actualidad":basePNOA,"MTN25":baseMTN,"PNOA 2020":basePNOA20,"PNOA 2017":basePNOA17,"PNOA 2014":basePNOA14,"PNOA 2011":basePNOA11,"PNOA 2009":basePNOA09,"Vuelo Americano 1956":baseAMS},{},{position:"topright"}).addTo(map);

// --- Side-by-side plugin (inlined from leaflet-side-by-side) ---
(function(){
  function getRangeEvent(r){return 'oninput' in r?'input':'change'}
  var mapDrag,mapTap;
  function cancelDrag(){mapDrag=this._map.dragging.enabled();mapTap=this._map.tap&&this._map.tap.enabled();this._map.dragging.disable();this._map.tap&&this._map.tap.disable()}
  function uncancelDrag(e){this._refocusOnMap(e);if(mapDrag)this._map.dragging.enable();if(mapTap)this._map.tap.enable()}
  function asArray(a){return a===undefined?[]:Array.isArray(a)?a:[a]}
  L.Control.SideBySide=L.Control.extend({
    options:{thumbSize:42,padding:0},
    initialize:function(l,r,o){this.setLeftLayers(l);this.setRightLayers(r);L.setOptions(this,o)},
    getPosition:function(){var v=this._range.value,o=(0.5-v)*(2*this.options.padding+this.options.thumbSize);return this._map.getSize().x*v+o},
    setPosition:function(){},
    includes:L.Evented.prototype,
    addTo:function(map){this.remove();this._map=map;var c=this._container=L.DomUtil.create('div','leaflet-sbs',map._controlContainer);
      this._divider=L.DomUtil.create('div','leaflet-sbs-divider',c);var r=this._range=L.DomUtil.create('input','leaflet-sbs-range',c);
      r.type='range';r.min=0;r.max=1;r.step='any';r.value=0.5;r.style.paddingLeft=r.style.paddingRight=this.options.padding+'px';
      this._addEvents();this._updateLayers();return this},
    remove:function(){if(!this._map)return this;if(this._leftLayer)this._leftLayer.getContainer().style.clip='';
      if(this._rightLayer)this._rightLayer.getContainer().style.clip='';this._removeEvents();L.DomUtil.remove(this._container);this._map=null;return this},
    setLeftLayers:function(l){this._leftLayers=asArray(l);this._updateLayers();return this},
    setRightLayers:function(r){this._rightLayers=asArray(r);this._updateLayers();return this},
    _updateClip:function(){var m=this._map,nw=m.containerPointToLayerPoint([0,0]),se=m.containerPointToLayerPoint(m.getSize()),cx=nw.x+this.getPosition(),dx=this.getPosition();
      this._divider.style.left=dx+'px';
      var cl='rect('+[nw.y,cx,se.y,nw.x].join('px,')+'px)',cr='rect('+[nw.y,se.x,se.y,cx].join('px,')+'px)';
      if(this._leftLayer)this._leftLayer.getContainer().style.clip=cl;if(this._rightLayer)this._rightLayer.getContainer().style.clip=cr},
    _updateLayers:function(){if(!this._map)return;var pl=this._leftLayer,pr=this._rightLayer;this._leftLayer=this._rightLayer=null;
      this._leftLayers.forEach(function(l){if(this._map.hasLayer(l))this._leftLayer=l},this);
      this._rightLayers.forEach(function(l){if(this._map.hasLayer(l))this._rightLayer=l},this);this._updateClip()},
    _addEvents:function(){var r=this._range,m=this._map;if(!m||!r)return;m.on('move',this._updateClip,this);m.on('layeradd layerremove',this._updateLayers,this);
      L.DomEvent.on(r,getRangeEvent(r),this._updateClip,this);L.DomEvent.on(r,'touchstart',cancelDrag,this);L.DomEvent.on(r,'touchend',uncancelDrag,this);
      L.DomEvent.on(r,'mousedown',cancelDrag,this);L.DomEvent.on(r,'mouseup',uncancelDrag,this)},
    _removeEvents:function(){var r=this._range,m=this._map;if(r){L.DomEvent.off(r,getRangeEvent(r),this._updateClip,this);L.DomEvent.off(r,'touchstart',cancelDrag,this);
      L.DomEvent.off(r,'touchend',uncancelDrag,this);L.DomEvent.off(r,'mousedown',cancelDrag,this);L.DomEvent.off(r,'mouseup',uncancelDrag,this)}
      if(m){m.off('layeradd layerremove',this._updateLayers,this);m.off('move',this._updateClip,this)}}
  });
  L.control.sideBySide=function(l,r,o){return new L.Control.SideBySide(l,r,o)};
})();

// --- Comparar ---
let compareActive=false,sbsControl=null,cmpLeftLayer=null,cmpRightLayer=null;
const cmpLayers={
  carto:()=>L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{maxZoom:19}),
  pnoa:()=>L.tileLayer("https://www.ign.es/wmts/pnoa-ma?layer=OI.OrthoimageCoverage&style=default&tilematrixset=GoogleMapsCompatible&Service=WMTS&Request=GetTile&Version=1.0.0&format=image/jpeg&TileMatrix={z}&TileRow={y}&TileCol={x}",{maxZoom:19}),

function hc(h){return h?"#"+h.replace(/^#/,""):"#888"}

async function loadLineas(){
  const d=await apiFetch("lineas/lineas");
  const raw=d.lineas||d;
  Object.keys(raw).forEach(k=>{
    const l=raw[k];if(!l||!l.codigo)return;
    const id=l.idlinea||parseInt(k);
    lineas[id]={id,codigo:l.codigo,color:hc(l.colorhex),desc:l.descripcion?.trim()};
  });

async function getRouteGeometry(stops){
  if(stops.length<2)return stops;
  const coords=stops.map(s=>s[1]+","+s[0]).join(";");
  try{
    const r=await fetch(`${OSRM}/${coords}?overview=full&geometries=geojson&steps=false`);
    if(!r.ok)return stops;
    const d=await r.json();
    if(d.code==="Ok"&&d.routes?.[0]?.geometry?.coordinates){
      return d.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
    }
  }catch{}
  return stops;
}

async function loadAllTrayectos(idlinea){
  const tids=LINE_TRAYECTOS[idlinea]||[1,2];
  const results=await Promise.all(tids.map(async tid=>{
    try{
      const d=await apiFetch(`trayectos/trayectos/${idlinea}/${tid}`);
      if(d.paradas&&d.paradas.length>2)
        return{stops:d.paradas.map(p=>[parseFloat(p.latitud),parseFloat(p.longitud)]),desc:d.descripcion,destino:d.destino};
    }catch{}
    return null;
  }));
  return results.filter(Boolean);
}

async function loadRouteForLine(id,line){
  if(loadedRoutes.has(id))return;
  loadedRoutes.add(id);
  showStatus(`Cargando L${line.codigo}...`);
  showProg(5);
  const trayectos=await loadAllTrayectos(id);
  if(!trayectos.length){showStatus("");hideProg();return}
  showProg(20);
  showStatus(`L${line.codigo}: calculando rutas...`);
  showProg(30);
  const geometries=await Promise.all(trayectos.map(t=>getRouteGeometry(t.stops)));
  showProg(85);
  const group=L.layerGroup().addTo(map);
  const drawnStops=new Set();
  trayectos.forEach((tray,i)=>{
    L.polyline(geometries[i],{color:line.color,weight:4,opacity:0.7}).addTo(group).bindPopup(`<b>L${line.codigo}</b> → ${tray.destino||""}<br><small>${tray.desc||""}</small>`);
    tray.stops.forEach(s=>{
      const key=s[0].toFixed(5)+","+s[1].toFixed(5);
      if(!drawnStops.has(key)){drawnStops.add(key);L.circleMarker(s,{radius:3,fillColor:"#fff",color:line.color,weight:2,fillOpacity:1}).addTo(group)}
    });
  });
  routeLayers[id]=group;
  showProg(100);
  showStatus("");
  setTimeout(hideProg,400);
}

function buildLegend(){
  const legList=document.getElementById("leg-list");
  const entries=Object.entries(lineas).sort((a,b)=>{
    const na=parseInt(a[1].codigo)||99,nb=parseInt(b[1].codigo)||99;return na-nb;
  });
  for(const[id,line]of entries){
    hiddenLines.add(parseInt(id));
    const div=document.createElement("div");
    div.className="leg-line off";
    div.dataset.lineId=id;
    div.innerHTML=`<div class="leg-dot" style="background:${line.color}">${line.codigo}</div><span class="leg-name">${line.desc?.split("-").slice(0,2).join("-").trim()||""}</span>`;
    div.addEventListener("click",async()=>{
      const loaded=loadedRoutes.has(id);
      if(!loaded){
        await loadRouteForLine(id,line);
        if(!routeLayers[id])return;
        hiddenLines.delete(parseInt(id));
        div.classList.remove("off");
      }else{
        const vis=map.hasLayer(routeLayers[id]);
        if(vis){map.removeLayer(routeLayers[id]);div.classList.add("off");hiddenLines.add(parseInt(id))}
        else{routeLayers[id].addTo(map);div.classList.remove("off");hiddenLines.delete(parseInt(id))}
      }
      loadBuses();
    });
    legList.appendChild(div);
  }
}

const WU_KEY="e1f10a1e78da46f5b10a1e78da96f525";
const WU_NEAR="https://api.weather.com/v3/location/near?geocode=43.5322,-5.6611&product=pws&format=json&apiKey="+WU_KEY;
const WU_OBS="https://api.weather.com/v2/pws/observations/current?format=json&units=m&numericPrecision=decimal&apiKey="+WU_KEY+"&stationId=";
let meteoLayer=null;

function tempColor(t){
  if(t==null)return"#888";
  if(t<=0)return"#1565C0";if(t<=5)return"#1E88E5";if(t<=10)return"#42A5F5";
  if(t<=15)return"#26A69A";if(t<=20)return"#66BB6A";if(t<=25)return"#FDD835";
  if(t<=30)return"#FFA726";if(t<=35)return"#EF5350";return"#B71C1C";
}

async function loadMeteo(){
  try{
    showStatus("Cargando estaciones meteorológicas...");
    const nr=await fetch(WU_NEAR);if(!nr.ok)throw new Error(nr.status);
    const nd=await nr.json();
    const loc=nd.location;
    if(!loc||!loc.stationId)throw new Error("Sin estaciones");
    const ids=loc.stationId.slice(0,15);

    const obsAll=await Promise.all(ids.map(async id=>{
      try{
        const r=await fetch(WU_OBS+id);if(!r.ok)return null;
        const d=await r.json();
        const o=d.observations?.[0];if(!o)return null;
        return{id,name:o.neighborhood||id,lat:o.lat,lon:o.lon,temp:o.metric?.temp,humidity:o.humidity,
          wind:o.metric?.windSpeed,gust:o.metric?.windGust,winddir:o.winddir,pressure:o.metric?.pressure,
          precip:o.metric?.precipTotal,heatIndex:o.metric?.heatIndex,dewpt:o.metric?.dewpt,
          time:o.obsTimeLocal?.split(" ")[1]?.slice(0,5)||""};
      }catch{return null}
    }));
    const obs=obsAll.filter(Boolean);

    if(meteoLayer)meteoLayer.clearLayers();else meteoLayer=L.layerGroup();
    if(currentMode==="meteo")meteoLayer.addTo(map);

    obs.forEach(s=>{
      const col=tempColor(s.temp);
      const icon=L.divIcon({html:`<div class="aire-icon" style="background:${col}">${s.temp!=null?Math.round(s.temp):"--"}°</div>`,className:"",iconSize:[36,36],iconAnchor:[18,18]});
      L.marker([s.lat,s.lon],{icon}).addTo(meteoLayer).bindPopup(
        `<b>${s.name}</b><br><small>${s.id} · ${s.time}</small><br>`+
        `Temp: <b>${s.temp}°C</b> · Sensación: ${s.heatIndex}°C<br>`+
        `Humedad: ${s.humidity}% · Rocío: ${s.dewpt}°C<br>`+
        `Viento: ${s.wind} km/h (racha ${s.gust}) · Dir: ${s.winddir}°<br>`+
        `Presión: ${s.pressure} hPa · Precip: ${s.precip} mm`
      );
    });

    const temps=obs.map(s=>s.temp).filter(t=>t!=null);
    const avgTemp=temps.length?temps.reduce((a,b)=>a+b,0)/temps.length:null;
    const avgCol=tempColor(avgTemp);
    const hums=obs.map(s=>s.humidity).filter(h=>h!=null);
    const avgHum=hums.length?hums.reduce((a,b)=>a+b,0)/hums.length:null;
    const winds=obs.map(s=>s.wind).filter(w=>w!=null);
    const avgWind=winds.length?winds.reduce((a,b)=>a+b,0)/winds.length:null;
    const totalPrecip=obs.reduce((a,s)=>Math.max(a,s.precip||0),0);

    let html=`<div class="meteo-avg"><div class="meteo-avg-temp" style="color:${avgCol}">${avgTemp!=null?avgTemp.toFixed(1):"--"}°C</div>`;
    html+=`<div class="meteo-avg-label">${obs.length} estaciones · 💧 ${avgHum!=null?avgHum.toFixed(0):"--"}%<br>💨 ${avgWind!=null?avgWind.toFixed(0):"--"} km/h · 🌧 ${totalPrecip.toFixed(1)} mm</div></div>`;

    obs.sort((a,b)=>(b.temp||0)-(a.temp||0));
    obs.forEach(s=>{
      const col=tempColor(s.temp);
      const windArrow=s.winddir!=null?["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSO","SO","OSO","O","ONO","NO","NNO"][Math.round(s.winddir/22.5)%16]:"--";
      html+=`<div class="meteo-card"><div class="meteo-card-head"><div class="meteo-name">${s.name}</div><div class="meteo-temp" style="color:${col}">${s.temp!=null?s.temp.toFixed(1):"--"}°</div></div>`;
      html+=`<div class="meteo-details">💧 ${s.humidity||"--"}% · 💨 ${s.wind||"--"} km/h ${windArrow} · 🌧 ${s.precip||0} mm · ${s.time}</div></div>`;
    });

    document.getElementById("info").textContent=`${obs.length} estaciones · ${avgTemp!=null?avgTemp.toFixed(1):"--"}°C · ${new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})}`;
    showStatus("");
  }catch(e){showStatus("");document.getElementById("info").textContent="Error meteo: "+e.message}
}

// --- Calidad del Aire ---
const AIRE_URL="https://opendata.gijon.es/descargar.php?id=1&tipo=CSV";
let aireLayer=null;

function parseAireCSV(text){
  const lines=text.trim().split("\n");
  return lines.slice(1).map(line=>{
    const vals=[];let cur="",inQ=false;
    for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===","&&!inQ){vals.push(cur.trim());cur=""}else cur+=ch}
    vals.push(cur.trim());
    return{id:vals[0],name:vals[1],lat:parseFloat(vals[2]),lon:parseFloat(vals[3]),fecha:vals[4],hora:parseInt(vals[5]),
      SO2:parseFloat(vals[6]),NO:parseFloat(vals[7]),NO2:parseFloat(vals[8]),CO:parseFloat(vals[9]),
      PM10:parseFloat(vals[10]),O3:parseFloat(vals[11]),dd:parseFloat(vals[12]),vv:parseFloat(vals[13]),
      TMP:parseFloat(vals[14]),HR:parseFloat(vals[15]),PRB:parseFloat(vals[16]),RS:parseFloat(vals[17]),
      LL:parseFloat(vals[18]),BEN:parseFloat(vals[19]),TOL:parseFloat(vals[20]),MXIL:parseFloat(vals[21]),PM25:parseFloat(vals[22])};
  });
}

function getLatestByStation(rows){
  const st={};
  rows.forEach(r=>{
    if(!r.id||isNaN(r.TMP)&&isNaN(r.NO2)&&isNaN(r.PM10))return;
    const prev=st[r.id];
    if(!prev||r.fecha>prev.fecha||(r.fecha===prev.fecha&&r.hora>prev.hora))st[r.id]=r;
  });
  return Object.values(st);
}

function airQuality(r){
  const no2=r.NO2||0,pm10=r.PM10||0,pm25=r.PM25||0,o3=r.O3||0,so2=r.SO2||0;
  if(pm10>100||pm25>50||no2>200||o3>180||so2>350)return{label:"Mala",color:"#ef4444"};
  if(pm10>50||pm25>25||no2>100||o3>120||so2>200)return{label:"Mejorable",color:"#f97316"};
  if(pm10>25||pm25>15||no2>50||o3>60||so2>100)return{label:"Aceptable",color:"#f59e0b"};
  return{label:"Buena",color:"#22c55e"};
}

function v(n){return isNaN(n)?"--":n}

function yesterdayStr(){
  const d=new Date();d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}

function getRainYesterday(rows){
  const ayer=yesterdayStr();
  const acc={};
  rows.forEach(r=>{
    if(r.fecha!==ayer||isNaN(r.LL))return;
    if(!acc[r.id])acc[r.id]={id:r.id,name:r.name,lat:r.lat,lon:r.lon,total:0};
    acc[r.id].total+=r.LL;
  });
  return Object.values(acc);
}

function rainColor(mm){
  if(mm<=0)return"rgba(100,181,246,0.15)";
  if(mm<2)return"rgba(100,181,246,0.3)";
  if(mm<5)return"rgba(66,165,245,0.4)";
  if(mm<15)return"rgba(30,136,229,0.45)";
  return"rgba(21,101,192,0.5)";
}

async function loadAire(){
  try{
    showStatus("Cargando calidad del aire...");
    const r=await fetch(AIRE_URL);if(!r.ok)throw new Error(r.status);
    const rows=parseAireCSV(await r.text());
    const latest=getLatestByStation(rows);
    const rain=getRainYesterday(rows);
    if(aireLayer)aireLayer.clearLayers();else aireLayer=L.layerGroup();
    if(currentMode==="aire")aireLayer.addTo(map);

    rain.forEach(s=>{
      if(s.total<=0)return;
      const radius=Math.min(300+s.total*120,2500);
      L.circle([s.lat,s.lon],{radius,color:rainColor(s.total),fillColor:rainColor(s.total),fillOpacity:1,weight:0,interactive:false}).addTo(aireLayer);
    });

    let panelHtml="";
    latest.forEach(s=>{
      const q=airQuality(s);
      const icon=L.divIcon({html:`<div class="aire-icon" style="background:${q.color}">${isNaN(s.TMP)?"--":Math.round(s.TMP)}°</div>`,className:"",iconSize:[36,36],iconAnchor:[18,18]});
      const shortName=s.name.replace("Estación ","");
      const stRain=rain.find(x=>x.id===s.id);
      const rainMm=stRain?stRain.total.toFixed(1):"0";
      L.marker([s.lat,s.lon],{icon}).addTo(aireLayer).bindPopup(
        `<b>${s.name}</b><br><small>${s.fecha} · ${s.hora}:00h</small><br><b style="color:${q.color}">Calidad: ${q.label}</b>`+
        `<hr style="border-color:rgba(0,0,0,.1);margin:4px 0"><b>Meteorología</b><br>`+
        `Temp: ${v(s.TMP)}°C · Humedad: ${v(s.HR)}% · Viento: ${v(s.vv)} m/s · Presión: ${v(s.PRB)} hPa`+
        `<br>Lluvia ahora: ${v(s.LL)} mm · <b>Acum. ayer: ${rainMm} mm</b>`+
        `<hr style="border-color:rgba(0,0,0,.1);margin:4px 0"><b>Contaminantes (μg/m³)</b><br>`+
        `NO₂: ${v(s.NO2)} · PM₁₀: ${v(s.PM10)} · PM₂.₅: ${v(s.PM25)}<br>O₃: ${v(s.O3)} · SO₂: ${v(s.SO2)} · CO: ${v(s.CO)}`
      );
      panelHtml+=`<div class="aire-card"><div class="aire-station">${shortName}</div>`+
        `<div class="aire-row"><span>🌡 ${v(s.TMP)}°C</span><span>💧 ${v(s.HR)}%</span><span>💨 ${v(s.vv)} m/s</span><span>🌧 ${rainMm} mm ayer</span></div>`+
        `<div class="aire-row"><span class="aire-qual" style="color:${q.color}">● ${q.label}</span><span>NO₂ ${v(s.NO2)}</span><span>PM₁₀ ${v(s.PM10)}</span><span>O₃ ${v(s.O3)}</span></div></div>`;
    });
    document.getElementById("aire-stops").innerHTML=panelHtml;
    const d=latest[0];
    document.getElementById("info").textContent=d?`${latest.length} estaciones · ${d.fecha} ${d.hora}:00h`:"Sin datos";
    showStatus("");
  }catch(e){showStatus("");document.getElementById("info").textContent="Error aire: "+e.message}
}

// --- Gijón Bici ---
const BICI_API="https://api.citybik.es/v2/networks/gijon";
const BICI_DETAIL="https://api.allorigins.win/get?url="+encodeURIComponent("https://bici.gijon.es/api/client/entities/stations/");
let biciLayer=null,biciTimer=null,currentMode="bus";

function setMode(mode){
  // Cerrar comparador si está activo
  if(compareActive)toggleCompare();
  // Limpiar marcador callejero

  currentMode=mode;
  document.getElementById("mode-bus").classList.toggle("on",mode==="bus");
  document.getElementById("mode-bici").classList.toggle("on",mode==="bici");
  document.getElementById("mode-taxi").classList.toggle("on",mode==="taxi");
  document.getElementById("mode-aire").classList.toggle("on",mode==="aire");
  document.getElementById("mode-meteo").classList.toggle("on",mode==="meteo");
  document.getElementById("mode-compare").classList.remove("on");

  // Paneles
  document.getElementById("bus-tabs").style.display=mode==="bus"?"block":"none";
  document.getElementById("legend").style.display="none";
  document.getElementById("search-panel").style.display="none";
  document.getElementById("taxi-panel").style.display=mode==="taxi"?"block":"none";
  document.getElementById("aire-panel").style.display=mode==="aire"?"block":"none";
  document.getElementById("compare-bar").style.display="none";

  // Limpiar capas
  if(mode!=="bus"){closeStopDash();if(stopsLayer)map.removeLayer(stopsLayer);activeBusTab=null;document.querySelectorAll("#bus-tabs .tab-btn").forEach(b=>b.classList.remove("on"))}
  else{setBusTab("par")}
  if(busLayer){if(mode==="bus")busLayer.addTo(map);else map.removeLayer(busLayer)}
  Object.entries(routeLayers).forEach(([id,layer])=>{
    if(mode==="bus"&&!hiddenLines.has(parseInt(id)))layer.addTo(map);
    else map.removeLayer(layer);
  });
  if(biciLayer){if(mode==="bici")biciLayer.addTo(map);else map.removeLayer(biciLayer)}
  if(taxiLayer){if(mode==="taxi")taxiLayer.addTo(map);else map.removeLayer(taxiLayer)}
  if(aireLayer){if(mode==="aire")aireLayer.addTo(map);else map.removeLayer(aireLayer)}
  if(meteoLayer){if(mode==="meteo")meteoLayer.addTo(map);else map.removeLayer(meteoLayer)}
  if(nearbyMarkers&&mode!=="bus")nearbyMarkers.clearLayers();

  // Timer bici
  if(biciTimer&&mode!=="bici"){clearInterval(biciTimer);biciTimer=null}
  if(mode==="bici"){loadBici();if(!biciTimer)biciTimer=setInterval(loadBici,30000)}
  else if(mode==="taxi")loadTaxi();
  else if(mode==="aire")loadAire();
  else if(mode==="meteo")loadMeteo();
  else if(mode==="bus")loadBuses();
}

function biciColor(n){if(n<=0)return"#ef4444";if(n<=2)return"#f59e0b";return"#22c55e"}

async function loadBici(){
  try{
    const r=await fetch(BICI_API);if(!r.ok)return;
    const d=await r.json();
    const stations=d.network?.stations||[];
    if(biciLayer)biciLayer.clearLayers();else biciLayer=L.layerGroup();
    if(currentMode==="bici")biciLayer.addTo(map);
    let totalBikes=0;
    stations.forEach(s=>{
      const bikes=s.free_bikes||0;
      const uid=s.extra?.uid;
      totalBikes+=bikes;
      const color=biciColor(bikes);
      const icon=L.divIcon({html:`<div class="bici-icon" style="background:${color}">${bikes}</div>`,className:"",iconSize:[24,24],iconAnchor:[12,12]});
      const marker=L.marker([s.latitude,s.longitude],{icon}).addTo(biciLayer);
      const popupDiv=document.createElement("div");
      popupDiv.innerHTML=`<b>${s.name}</b><br>Bicis disponibles: <b style="color:${biciColor(bikes)}">${bikes}</b><br><span class="bici-slots" style="color:#888">Plazas: cargando...</span>`;
      marker.bindPopup(popupDiv);
      marker.on("popupopen",async()=>{
        if(!uid)return;
        try{
          const dr=await fetch(BICI_DETAIL+uid);if(!dr.ok)return;
          const dw=await dr.json();const inner=JSON.parse(dw.contents);
          const st=inner.data?.station;if(!st)return;
          popupDiv.querySelector(".bici-slots").innerHTML=`Plazas disponibles: <b>${st.availableSlots||0}</b>`;
        }catch{}
      });
    });
    document.getElementById("info").textContent=`${stations.length} estaciones · ${totalBikes} bicis disponibles · ${new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})}`;
  }catch(e){document.getElementById("info").textContent="Error bici: "+e.message}
}

// --- Search + Dashboard ---
let allStops=null,searchMarker=null,nearbyMarkers=L.layerGroup().addTo(map),stopsLayer=null;
const CARTO_CANDIDATES="https://www.cartociudad.es/geocoder/api/geocoder/candidates";
const CARTO_FIND="https://www.cartociudad.es/geocoder/api/geocoder/find";

async function loadAllStops(){
  const d=await apiFetch("paradas/todasParadas");
  allStops=Object.values(d).filter(s=>s&&s.latitud).map(s=>({id:s.idparada,name:s.descripcion,lat:parseFloat(s.latitud),lon:parseFloat(s.longitud)}));
}

function findNearestStops(lat,lon,n){
  if(!allStops)return[];
  return allStops.map(s=>{const dx=(s.lon-lon)*Math.cos(lat*Math.PI/180)*111320,dy=(s.lat-lat)*111320;return{...s,dist:Math.sqrt(dx*dx+dy*dy)}}).sort((a,b)=>a.dist-b.dist).slice(0,n);
}

let searchDeb=null,searchMode="address";
const sinp=document.getElementById("inp-search"),slist=document.getElementById("sug-list");

function normalizeText(t){return t.normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase()}

function searchStopsLocal(query){
  if(!allStops)return[];
  const q=normalizeText(query);
  const isNum=/^\d+$/.test(query.trim());
  return allStops.filter(s=>{
    if(isNum)return String(s.id).includes(query.trim());
    return normalizeText(s.name).includes(q);
  }).slice(0,8);
}

function buildStopsLayer(){
  if(stopsLayer||!allStops)return;
  stopsLayer=L.layerGroup();
  allStops.forEach(s=>{
    L.circleMarker([s.lat,s.lon],{radius:5,fillColor:"#1565C0",color:"#fff",weight:1.5,fillOpacity:0.8})
      .addTo(stopsLayer)
      .bindTooltip(s.name,{direction:"top",offset:[0,-6],className:"stop-label"})
      .on("click",()=>showStopDash(s));
  });
}

let activeBusTab=null;
function setBusTab(tab){
  if(activeBusTab===tab){
    activeBusTab=null;
    document.querySelectorAll("#bus-tabs .tab-btn").forEach(b=>b.classList.remove("on"));
    document.getElementById("search-panel").style.display="none";
    document.getElementById("legend").style.display="none";
    if(stopsLayer)map.removeLayer(stopsLayer);
    closeStopDash();
    return;
  }
  activeBusTab=tab;
  document.getElementById("tab-dir").classList.toggle("on",tab==="dir");
  document.getElementById("tab-par").classList.toggle("on",tab==="par");
  document.getElementById("tab-lin").classList.toggle("on",tab==="lin");
  if(tab==="dir"){
    searchMode="address";sinp.value="";slist.style.display="none";
    sinp.placeholder="Buscar dirección en Gijón...";
    document.getElementById("search-panel").style.display="block";
    document.getElementById("legend").style.display="none";
    if(stopsLayer)map.removeLayer(stopsLayer);
    closeStopDash();
  }else if(tab==="par"){
    searchMode="stop";sinp.value="";slist.style.display="none";
    sinp.placeholder="Buscar parada (nombre o código)...";
    document.getElementById("search-panel").style.display="block";
    document.getElementById("legend").style.display="none";
    buildStopsLayer();if(stopsLayer)stopsLayer.addTo(map);
  }else if(tab==="lin"){
    document.getElementById("search-panel").style.display="none";
    document.getElementById("legend").style.display="block";
    if(stopsLayer)map.removeLayer(stopsLayer);
    closeStopDash();
  }
}

async function showStopDash(stop){
  nearbyMarkers.clearLayers();
  if(searchMarker){map.removeLayer(searchMarker);searchMarker=null}
  L.circleMarker([stop.lat,stop.lon],{radius:10,fillColor:"#1565C0",color:"#fff",weight:3,fillOpacity:0.9}).addTo(nearbyMarkers)
    .bindTooltip(stop.name,{permanent:true,direction:"right",offset:[10,0],className:"stop-label"});
  map.setView([stop.lat+0.002,stop.lon],17);

  const panel=document.getElementById("stop-dash");
  const container=document.getElementById("sd-stops");
  document.getElementById("sd-label").innerHTML=`${stop.name} <span class="sd-code">#${stop.id}</span>`;
  container.innerHTML="<div style='color:#888;font-size:12px'>Cargando...</div>";
  panel.style.display="block";

  let html="";
  try{
    const d=await apiFetch(`paradas/parada/${stop.id}`);
    const llegadas=d.llegadas||[];
    if(llegadas.length){
      html=llegadas.map(l=>{
        const lineColor=lineas[l.linea?.idlinea]?.color||"#888";
        return`<div class="arrival"><div class="arr-line" style="background:${lineColor}">${l.linea?.codigo||"?"}</div><div class="arr-dest">${l.trayecto?.destino||""}</div><div class="arr-time">${l.minutos} min</div></div>`;
      }).join("");
    }else{html=`<div style="color:#666;font-size:12px">Sin buses en este momento</div>`}
  }catch{html=`<div style="color:#666;font-size:12px">Error al consultar</div>`}
  container.innerHTML=html;
}

function closeStopDash(){document.getElementById("stop-dash").style.display="none";nearbyMarkers.clearLayers();if(searchMarker){map.removeLayer(searchMarker);searchMarker=null}}

sinp.addEventListener("input",function(){clearTimeout(searchDeb);const q=this.value.trim();
  if(searchMode==="stop"){
    if(q.length<2){slist.style.display="none";return}
    const matches=searchStopsLocal(q);
    if(!matches.length){slist.style.display="none";return}
    slist.innerHTML="";
    matches.forEach(s=>{const div=document.createElement("div");div.innerHTML=`${s.name}<small> #${s.id}</small>`;
      div.addEventListener("click",()=>{slist.style.display="none";sinp.value=s.name;showStopDash(s)});
      slist.appendChild(div)});
    slist.style.display="block";return;
  }
  if(q.length<3){slist.style.display="none";return}
  searchDeb=setTimeout(async()=>{
    try{const r=await fetch(`${CARTO_CANDIDATES}?q=${encodeURIComponent(q+" gijon")}&limit=5`);if(!r.ok)return;
    const data=await r.json();
    const gij=data.filter(d=>d.muniCode==="33024");
    if(!gij.length){slist.style.display="none";return}
    slist.innerHTML="";
    gij.forEach(d=>{const div=document.createElement("div");div.innerHTML=`${d.address}<small> ${d.tip_via||""}</small>`;
      div.addEventListener("click",async()=>{slist.style.display="none";sinp.value=d.address;
        try{const fr=await fetch(`${CARTO_FIND}?q=${encodeURIComponent(d.address+" gijon")}&type=${d.type}&id=${d.id}`);if(!fr.ok)return;
        const fd=await fr.json();if(fd.lat&&fd.lng)showNearby(fd.lat,fd.lng)}catch{}
      });slist.appendChild(div)});
    slist.style.display="block"}catch{}
  },400)});
sinp.addEventListener("keydown",e=>{if(e.key==="Enter"){slist.style.display="none";const q=sinp.value.trim();
  if(searchMode==="stop"){if(q.length>=2){const matches=searchStopsLocal(q);if(matches.length)showStopDash(matches[0])}return}
  if(q.length>=3)(async()=>{
  try{const r=await fetch(`${CARTO_FIND}?q=${encodeURIComponent(q+" gijon")}`);if(!r.ok)return;const d=await r.json();if(d.lat&&d.lng)showNearby(d.lat,d.lng)}catch{}})()}});
document.addEventListener("click",e=>{if(!e.target.closest("#search-panel"))slist.style.display="none"});

function gpsSearch(){
  if(!navigator.geolocation){alert("Geolocalización no disponible");return}
  showStatus("Obteniendo ubicación...");
  navigator.geolocation.getCurrentPosition(p=>{showStatus("");showNearby(p.coords.latitude,p.coords.longitude)},
    e=>{showStatus("");alert("Error GPS: "+e.message)},{enableHighAccuracy:true,timeout:10000});
}

async function showNearby(lat,lon){
  nearbyMarkers.clearLayers();
  if(searchMarker){map.removeLayer(searchMarker);searchMarker=null}
  searchMarker=L.marker([lat,lon],{zIndexOffset:2000}).addTo(map).bindPopup("Tu ubicación").openPopup();
  map.setView([lat+0.003,lon],16);

  const nearest=findNearestStops(lat,lon,5);
  if(!nearest.length){showStatus("No hay paradas cercanas");return}

  nearest.forEach((s,i)=>{
    L.circleMarker([s.lat,s.lon],{radius:8,fillColor:"#1565C0",color:"#fff",weight:2,fillOpacity:0.9}).addTo(nearbyMarkers)
      .bindTooltip(`${i+1}. ${s.name}`,{permanent:true,direction:"right",offset:[10,0],className:"stop-label"});
  });

  const panel=document.getElementById("stop-dash");
  const container=document.getElementById("sd-stops");
  document.getElementById("sd-label").innerHTML="Paradas cercanas";
  container.innerHTML="<div style='color:#888;font-size:12px'>Cargando tiempos...</div>";
  panel.style.display="block";

  let html="";
  for(const s of nearest){
    const distTxt=s.dist<1000?Math.round(s.dist)+" m":(s.dist/1000).toFixed(1)+" km";
    let arrivalsHtml="";
    try{
      const d=await apiFetch(`paradas/parada/${s.id}`);
      const llegadas=d.llegadas||[];
      if(llegadas.length){
        arrivalsHtml=llegadas.map(l=>{
          const lineColor=lineas[l.linea?.idlinea]?.color||"#888";
          return`<div class="arrival"><div class="arr-line" style="background:${lineColor}">${l.linea?.codigo||"?"}</div><div class="arr-dest">${l.trayecto?.destino||""}</div><div class="arr-time">${l.minutos} min</div></div>`;
        }).join("");
      }else{arrivalsHtml=`<div style="color:#666;font-size:11px">Sin buses en este momento</div>`}
    }catch{arrivalsHtml=`<div style="color:#666;font-size:11px">Error al consultar</div>`}

    html+=`<div class="stop-card"><div class="stop-name">${s.name}</div><div class="stop-dist">A ${distTxt}</div>${arrivalsHtml}</div>`;
  }
  container.innerHTML=html;
}

async function init(){
  showStatus("Conectando...");
  try{
    await auth();
    showStatus("Cargando líneas...");
    await loadLineas();
    buildLegend();
    await loadAllStops();
    showStatus("Cargando buses...");
    await loadBuses();
    showStatus("");
    setInterval(loadBuses,15000);
    document.getElementById("bus-tabs").style.display="block";
    setBusTab("par");
  }catch(e){showStatus("Error: "+e.message)}
}

init();
</script>
